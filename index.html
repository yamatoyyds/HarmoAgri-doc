<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>智慧农业控制系统 - 项目文档</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="基于OpenHarmony的智慧农业控制系统项目文档">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/style.min.css">
  <style>
    :root {
      --theme-color: #42b983;
      --sidebar-width: 18.5rem;
      --sidebar-width-tablet: 17rem;
      --topbar-height: 3.75rem;
      --header-offset: calc(var(--topbar-height) + 1rem + env(safe-area-inset-top));
      --surface-color: var(--background, #ffffff);
      --border-color: var(--borderColor, rgba(0, 0, 0, 0.07));
      --focus-ring: 0 0 0 3px rgba(66, 185, 131, 0.24);
      --control-size: 2.5rem;
      --control-size-mobile: 2.25rem;
      --shell-padding: 1rem;
      --shell-padding-mobile: 0.75rem;
      --theme-icon-size: 0.95rem;
      --theme-icon-size-mobile: 0.75rem;
    }

    html {
      scroll-behavior: smooth;
    }

    body,
    .sidebar,
    .content,
    .markdown-section code,
    .page-topbar,
    .sidebar-topbar,
    .sidebar-toggle,
    #docsify-darklight-theme {
      transition: background-color 0.3s ease;
    }

    body {
      overflow-x: hidden;
      -webkit-tap-highlight-color: rgba(66, 185, 131, 0.18);
    }

    .app-nav,
    .sidebar,
    .sidebar-toggle,
    a,
    button {
      touch-action: manipulation;
    }

    .skip-link {
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 100;
      padding: 0.7rem 0.95rem;
      border-radius: 0.75rem;
      background: var(--theme-color);
      color: #ffffff;
      font-weight: 600;
      text-decoration: none;
      transform: translateY(calc(-100% - 0.75rem));
      transition: transform 0.2s ease;
    }

    .skip-link:focus-visible {
      transform: translateY(0);
      box-shadow: var(--focus-ring);
    }

    .page-topbar {
      position: fixed;
      top: 0;
      right: 0;
      left: var(--sidebar-width);
      height: calc(var(--topbar-height) + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) var(--shell-padding) 0;
      border-bottom: 1px solid var(--border-color);
      background-color: var(--surface-color);
      z-index: 35;
      transition: left 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
    }

    body.close .page-topbar {
      left: 0;
    }

    .sidebar-topbar {
      position: sticky;
      top: 0;
      z-index: 21;
      display: flex;
      align-items: center;
      min-height: calc(var(--topbar-height) + env(safe-area-inset-top));
      padding: env(safe-area-inset-top) var(--shell-padding) 0;
      border-bottom: 1px solid var(--border-color);
      background-color: var(--surface-color);
    }

    .sidebar {
      width: var(--sidebar-width);
      padding-top: 0;
      padding-bottom: calc(1.25rem + env(safe-area-inset-bottom));
      overscroll-behavior: contain;
      transition: transform 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
      transform: translateX(0);
    }

    .sidebar-toggle {
      position: fixed;
      top: calc(env(safe-area-inset-top) + ((var(--topbar-height) - var(--control-size)) / 2));
      left: calc(var(--sidebar-width) + var(--shell-padding));
      bottom: auto;
      width: var(--control-size);
      min-width: var(--control-size);
      height: var(--control-size);
      padding: 0.5rem;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.9rem;
      z-index: 40;
      border: 0;
      background: transparent;
      box-shadow: none;
      transition: left 0.3s ease, transform 0.2s ease, background-color 0.2s ease;
    }

    .sidebar-toggle span {
      display: block;
      width: 1rem;
      height: 2px;
      margin-bottom: 0.24rem;
      border-radius: 999px;
      background-color: currentColor;
      color: var(--textColor, #34495e);
      bottom: auto;
      left: auto;
    }

    .sidebar-toggle span:last-child {
      margin-bottom: 0;
    }

    .sidebar-toggle:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .sidebar-toggle:active,
    #docsify-darklight-theme:active {
      transform: scale(0.97);
    }

    #docsify-darklight-theme {
      position: fixed;
      top: calc(env(safe-area-inset-top) + ((var(--topbar-height) - var(--control-size)) / 2));
      right: calc(0.75rem + env(safe-area-inset-right));
      left: auto;
      width: var(--control-size);
      height: var(--control-size);
      border-radius: 0.9rem;
      background-color: transparent;
      box-shadow: none;
      z-index: 40;
      cursor: pointer;
      background-image: var(--toogleImage);
      background-repeat: no-repeat;
      background-position: center;
      background-size: var(--theme-icon-size) var(--theme-icon-size);
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    #docsify-darklight-theme:hover {
      background-color: rgba(0, 0, 0, 0.04);
    }

    #docsify-darklight-theme:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    #docsify-darklight-theme p {
      width: 1.2rem;
      height: 1.2rem;
      margin: 0;
      color: transparent;
      pointer-events: none;
      visibility: hidden;
    }

    .sidebar-toggle:focus-visible,
    .sidebar a:focus-visible,
    .app-nav a:focus-visible,
    .markdown-section a:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
      border-radius: 0.75rem;
    }

    .content {
      left: var(--sidebar-width);
      min-width: 0;
      padding-top: calc(var(--topbar-height) + env(safe-area-inset-top));
      transition: left 0.3s ease, background-color 0.3s ease;
    }

    body.close .content {
      left: 0;
    }

    body.close .sidebar {
      transform: translateX(calc(-1 * var(--sidebar-width)));
    }

    .markdown-section {
      overflow-wrap: break-word;
      margin: 0 auto;
      max-width: 56rem;
      padding: 2rem 2rem 3rem;
    }

    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      scroll-margin-top: var(--header-offset);
      text-wrap: balance;
    }

    .markdown-section table {
      display: block;
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .markdown-section pre,
    .markdown-section pre code {
      overflow-wrap: normal;
      word-break: normal;
    }

    .markdown-section pre {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .markdown-section :not(pre) > code {
      overflow-wrap: anywhere;
    }

    .sidebar-topbar .search {
      border: 0 !important;
      background: transparent;
      padding: 0;
      width: 100%;
    }

    .sidebar-topbar .search .input-wrap {
      margin-top: 0 !important;
    }

    .sidebar-topbar .search input {
      width: 100% !important;
      min-height: var(--control-size);
      margin: 0 !important;
      border: 0 !important;
      background: transparent !important;
      text-indent: 0;
      box-shadow: none;
      border-radius: 0;
      color: var(--textColor);
      font-size: 0.95rem;
    }

    .sidebar-topbar .search input::placeholder {
      color: color-mix(in srgb, var(--textColor) 56%, transparent);
    }

    .sidebar > h1 {
      margin: 1rem 1rem 0.75rem;
      font-size: 1.05rem;
      font-weight: 600;
      text-align: left;
    }

    .sidebar > h1 a {
      color: inherit;
    }

    .sidebar .sidebar-nav {
      padding: 0 0 1.5rem;
    }

    .sidebar ul {
      margin-left: 0;
      padding: 0 1rem;
    }

    .sidebar li {
      margin: 0.2rem 0;
    }

    .sidebar li > p {
      margin: 1rem 0 0.35rem;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--textColor) 62%, transparent);
    }

    .sidebar ul li a {
      padding: 0.34rem 0;
      border-right: 0;
      white-space: normal;
      line-height: 1.45;
    }

    .sidebar ul li.active > a {
      border-right: 0;
      font-weight: 600;
    }

    .content,
    .page-topbar {
      background: var(--surface-color);
    }

    @media screen and (max-width: 1100px) {
      .page-topbar {
        left: var(--sidebar-width-tablet);
      }

      .sidebar {
        width: var(--sidebar-width-tablet);
      }

      .sidebar-toggle {
        left: calc(var(--sidebar-width-tablet) + var(--shell-padding));
      }

      .content {
        left: var(--sidebar-width-tablet);
      }

      body.close .sidebar {
        transform: translateX(calc(-1 * var(--sidebar-width-tablet)));
      }
    }

    @media screen and (max-width: 768px) {
      .page-topbar {
        left: 0;
        padding-left: var(--shell-padding-mobile);
        padding-right: var(--shell-padding-mobile);
      }

      .sidebar {
        left: 0;
        width: min(18rem, calc(100vw - 3.5rem));
        padding-top: 0;
        box-shadow: 14px 0 36px rgba(0, 0, 0, 0.12);
        transform: translateX(calc(-100% - env(safe-area-inset-left) - 1rem));
      }

      .content {
        left: 0;
        padding-top: calc(var(--topbar-height) + env(safe-area-inset-top));
        transition: transform 0.3s ease, background-color 0.3s ease;
      }

      body.close .content {
        left: 0;
        transform: translateX(0);
      }

      body.close .sidebar {
        transform: translateX(0);
      }

      .sidebar-toggle {
        top: calc(env(safe-area-inset-top) + ((var(--topbar-height) - var(--control-size-mobile)) / 2));
        left: var(--shell-padding-mobile);
        width: var(--control-size-mobile);
        min-width: var(--control-size-mobile);
        height: var(--control-size-mobile);
        padding: 0.4rem;
      }

      #docsify-darklight-theme {
        top: calc(env(safe-area-inset-top) + ((var(--topbar-height) - var(--control-size-mobile)) / 2));
        right: var(--shell-padding-mobile);
        width: var(--control-size-mobile);
        height: var(--control-size-mobile);
        background-size: var(--theme-icon-size-mobile) var(--theme-icon-size-mobile);
      }

      .sidebar-topbar {
        min-height: calc(var(--topbar-height) + env(safe-area-inset-top));
        padding: env(safe-area-inset-top) var(--shell-padding-mobile) 0;
      }

      .sidebar-topbar .search input {
        min-height: var(--control-size-mobile);
      }

      .markdown-section {
        padding: 1.5rem 1rem 2.5rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      body,
      .sidebar,
      .search,
      .content,
      .markdown-section code,
      .sidebar-toggle,
      .skip-link {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">跳转到正文</a>
  <div class="page-topbar" aria-hidden="true"></div>
  <div id="app">加载中...</div>
  <script>
    function enhanceDocsifyLayout() {
      function updateThemeMeta() {
        var metaTheme = document.querySelector('meta[name="theme-color"]');
        if (!metaTheme) {
          return;
        }

        var background = getComputedStyle(document.documentElement).getPropertyValue('--background').trim();
        if (background) {
          metaTheme.setAttribute('content', background);
        }
      }

      function updateSidebarState() {
        var currentToggle = document.querySelector('.sidebar-toggle');
        if (!currentToggle) {
          return;
        }

        var isExpanded = !document.body.classList.contains('close');
        currentToggle.setAttribute('aria-expanded', String(isExpanded));
        currentToggle.setAttribute('aria-label', isExpanded ? '收起文档目录' : '展开文档目录');
        currentToggle.setAttribute('title', isExpanded ? '收起文档目录' : '展开文档目录');
      }

      var content = document.querySelector('.content');
      if (content) {
        content.id = 'main-content';
        content.setAttribute('role', 'main');
        content.setAttribute('tabindex', '-1');
      }

      var sidebar = document.querySelector('.sidebar');
      if (sidebar) {
        sidebar.id = 'main-sidebar';
        sidebar.setAttribute('role', 'navigation');
        sidebar.setAttribute('aria-label', '文档目录');

        var search = sidebar.querySelector('.search');
        var sidebarTopbar = sidebar.querySelector('.sidebar-topbar');

        if (!sidebarTopbar) {
          sidebarTopbar = document.createElement('div');
          sidebarTopbar.className = 'sidebar-topbar';
          sidebar.insertBefore(sidebarTopbar, sidebar.firstChild);
        }

        if (search && search.parentElement !== sidebarTopbar) {
          sidebarTopbar.setAttribute('role', 'search');
          sidebarTopbar.appendChild(search);
        }
      }

      var toggle = document.querySelector('.sidebar-toggle');
      if (toggle) {
        toggle.setAttribute('aria-controls', 'main-sidebar');
        updateSidebarState();
      }

      var searchInput = document.querySelector('.search input');
      if (searchInput) {
        searchInput.setAttribute('aria-label', '搜索文档');
        searchInput.setAttribute('autocomplete', 'off');
      }

      var themeToggle = document.getElementById('docsify-darklight-theme');
      if (themeToggle) {
        themeToggle.setAttribute('role', 'button');
        themeToggle.setAttribute('tabindex', '0');
        themeToggle.setAttribute('aria-label', '切换亮暗主题');
        themeToggle.setAttribute('title', '切换亮暗主题');

        if (!themeToggle.dataset.keyboardBound) {
          themeToggle.addEventListener('keydown', function (event) {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              themeToggle.click();
            }
          });
          themeToggle.dataset.keyboardBound = 'true';
        }

        if (!themeToggle.dataset.themeBound) {
          themeToggle.addEventListener('click', function () {
            window.requestAnimationFrame(updateThemeMeta);
          });
          themeToggle.dataset.themeBound = 'true';
        }
      }

      if (!document.body.dataset.sidebarObserverBound) {
        new MutationObserver(updateSidebarState).observe(document.body, {
          attributes: true,
          attributeFilter: ['class']
        });
        document.body.dataset.sidebarObserverBound = 'true';
      }

      updateThemeMeta();
    }

    window.$docsify = {
      name: '智慧农业控制系统',
      loadSidebar: true,
      subMaxLevel: 3,
      plugins: [
        function (hook) {
          hook.mounted(function () {
            enhanceDocsifyLayout();
          });

          hook.doneEach(function () {
            enhanceDocsifyLayout();
          });
        }
      ],
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      search: {
        placeholder: '搜索文档',
        noData: '没有找到结果',
        depth: 3
      },
      auto2top: true,
      darklightTheme: {
        defaultTheme: 'auto',
        siteFont: 'Source Sans Pro, Helvetica Neue, Arial, sans-serif',
        dark: {
          accent: '#42d392',
          toogleBackground: '#ffffff',
          background: '#1e1e1e',
          textColor: '#b4b4b4',
          codeTextColor: '#ffffff',
          codeBackgroundColor: '#2e2e2e',
          borderColor: '#444',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          sidebarSublink: '#b4b4b4',
          codeTypeColor: '#ffffff',
          coverBackground: 'linear-gradient(to left bottom, hsl(118, 50%, 30%) 0%, hsl(180, 50%, 30%) 100%)',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/icons/sun.svg)'
        },
        light: {
          accent: '#42b983',
          toogleBackground: '#091a28',
          background: '#ffffff',
          textColor: '#34495e',
          codeTextColor: '#525252',
          codeBackgroundColor: '#f8f8f8',
          borderColor: 'rgba(0,0,0,0.07)',
          blockQuoteColor: '#858585',
          highlightColor: '#d22778',
          sidebarSublink: '#505d6b',
          codeTypeColor: '#091a28',
          coverBackground: 'linear-gradient(to left bottom, hsl(118, 50%, 80%) 0%, hsl(180, 50%, 80%) 100%)',
          toogleImage: 'url(https://cdn.jsdelivr.net/npm/docsify-darklight-theme@3/icons/moon.svg)'
        }
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@3/dist/index.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
